<style>
/* =========================================================
 * PLAN REMAKE v3 - cleaned
 * ======================================================= */

/* =========================================================
 * Panel
 * ======================================================= */
#panel-plan{
  display:none;
  padding:12px 16px 16px;
  flex:1;
  min-height:0;
  box-sizing:border-box;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
}
#panel-plan.active{
  display:flex;
}
#panel-plan .panel-toolbar{
  flex:0 0 auto;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin:0;
}
#panel-plan .panel-toolbar-left,
#panel-plan .panel-toolbar-right{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
}

/* =========================================================
 * Common
 * ======================================================= */
.plan-card{
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:14px;
  overflow:hidden;
}
#panel-plan .plan-card{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.plan-toolbar-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:140px;
}
.plan-toolbar-group.plan-member-filter-group{
  position:relative;
}
.plan-label{
  font-size:12px;
  font-weight:600;
  color:#475569;
}
.plan-input,
.plan-select{
  width:100%;
  height:38px;
  min-width:140px;
  border:1px solid #cfd8e3;
  border-radius:10px;
  padding:0 10px;
  background:#fff;
  color:#111827;
  box-sizing:border-box;
}
.plan-input:focus,
.plan-select:focus{
  outline:none;
  border-color:#6aa9ff;
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
.plan-input-month{
  min-width:150px;
}
.plan-btn{
  height:38px;
  padding:0 14px;
  border:1px solid transparent;
  border-radius:10px;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:.15s ease;
}
.plan-btn:hover{
  filter:brightness(.98);
}
.plan-btn-primary{
  background:#2563eb;
  color:#fff;
}
.plan-btn-light{
  background:#fff;
  color:#334155;
  border-color:#cfd8e3;
}
.plan-text-center{ text-align:center; }
.plan-muted{ color:#94a3b8; }
.plan-half-label{
  font-weight:700;
  color:#475569;
}

/* =========================================================
 * Filter popup
 * ======================================================= */
.plan-member-filter-pop{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  width:220px;
  max-height:420px;
  overflow:auto;
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:14px;
  box-shadow:0 12px 32px rgba(15,23,42,.16);
  padding:12px;
  z-index:80;
}
.plan-member-filter-section + .plan-member-filter-section{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid #eef2f7;
}
.plan-member-filter-title{
  font-size:12px;
  font-weight:700;
  color:#475569;
  margin-bottom:8px;
}
.plan-filter-radio-list{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
.plan-filter-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:#334155;
}
.plan-filter-item input{
  margin:0;
}

/* =========================================================
 * Tag / text
 * ======================================================= */
.plan-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:16px;
  min-width:4.8em;
  max-width:100%;
  padding:0 5px;
  border-radius:999px;
  box-sizing:border-box;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:11px;
  line-height:1.15;
  font-weight:600;
  margin:1px 0;
  background:#e2e8f0;
  color:#334155;
}
.plan-chip.is-honsya{ background:#FCE4D6; color:#ED7D31; }
.plan-chip.is-kashiwa{ background:#dcfce7; color:#15803d; }
.plan-chip.is-yakura{ background:#ede9fe; color:#6d28d9; }
.plan-chip.is-client{ background:#ffedd5; color:#c2410c; }
.plan-chip.is-vacation{ background:#fee2e2; color:#b91c1c; }
.plan-chip.is-vacation-weekend{ background:#e5e7eb; color:#6b7280; }
.plan-chip.is-default{ background:#e2e8f0; color:#334155; }

.plan-customer,
.plan-customer-inline,
.plan-customer-sub{
  font-size:8px;
  line-height:1.1;
  font-weight:500;
  color:#64748b;
  opacity:.9;
}
.plan-customer-inline{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}

/* =========================================================
 * Summary Table
 * ======================================================= */
.plan-table-wrap{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  height:100%;
  overflow:auto;
  background:#fff;
  position:relative;
  overscroll-behavior:contain;
}
.plan-table-wrap::-webkit-scrollbar{
  height:12px;
  width:12px;
}
.plan-table-wrap::-webkit-scrollbar-thumb{
  background:#c6d4e3;
  border-radius:999px;
  border:2px solid #f8fafc;
}
.plan-table-wrap::-webkit-scrollbar-track{
  background:#f8fafc;
}

.plan-table{
  border-collapse:separate;
  border-spacing:0;
  width:max-content;
  min-width:100%;
  font-size:13px;
}
.plan-table th,
.plan-table td{
  box-sizing:border-box;
  border-right:1px solid #d6dee8;
  border-bottom:1px solid #d6dee8;
  padding:6px 8px;
  background:#fff;
  vertical-align:middle;
}
.plan-table tr > *:first-child{
  border-left:1px solid #d6dee8;
}
.plan-table thead tr:first-child > *{
  border-top:1px solid #d6dee8;
}

#planSummaryTable{
  table-layout:fixed;
  width:max-content;
  min-width:100%;
}
.plan-table-summary thead th{
  position:sticky;
  top:0;
  z-index:30;
  background:#dbe8f6;
  color:#111827;
  font-weight:700;
  text-align:center;
  white-space:nowrap;
  box-shadow:0 1px 0 #c7d5e6;
}
.plan-table-summary thead th.plan-summary-date-merged{
  left:0;
  z-index:45 !important;
}
.plan-summary-date-merged{
  width:154px;
  min-width:154px;
  max-width:154px;
  position:sticky !important;
  left:0;
  z-index:40 !important;
  background:#dbe8f6 !important;
}
.plan-summary-date,
.plan-table-summary td.plan-summary-date{
  width:110px;
  min-width:110px;
  max-width:110px;
  font-weight:700;
  background:#f8fafc;
  position:sticky;
  left:0;
  z-index:12;
}
.plan-summary-value,
.plan-table-summary td.plan-summary-value{
  width:44px;
  min-width:44px;
  max-width:44px;
  text-align:center;
  background:#f8fafc;
  position:sticky;
  left:110px;
  z-index:12;
}
.plan-table-summary td{
  height:44px;
  min-height:44px;
  max-height:44px;
  font-size:11px;
  white-space:normal;
  line-height:1.1;
  vertical-align:middle;
  overflow:hidden;
}
.plan-summary-cell,
#planSummaryTable th.plan-summary-cell,
#planSummaryTable td.plan-summary-cell{
  width:78px;
  min-width:78px;
  max-width:78px;
  padding:4px 6px;
  overflow:hidden;
  vertical-align:middle;
}
.plan-table-summary tbody td.plan-summary-cell{
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(180deg, #eef4fb, #e2ebf5) border-box;
}
.plan-table-summary tbody td.plan-summary-cell:empty,
#planSummaryTable .plan-summary-cell.is-blank{
  background:#fff;
}
#planSummaryTable th.plan-summary-cell.is-blank{
  color:transparent;
}
.plan-table-summary tbody tr:hover td{
  background-color:#fafcff;
}
.plan-table-summary tbody tr:hover td.plan-summary-date,
.plan-table-summary tbody tr:hover td.plan-summary-value{
  background:#eef4f8;
}

.plan-row-holiday td{ background:#fff7f7; }
.plan-row-sat td{ background:#f8fbff; }
.plan-row-holiday td.plan-summary-date,
.plan-row-holiday td.plan-summary-value{
  background:#fff1f1;
}
.plan-row-sat td.plan-summary-date,
.plan-row-sat td.plan-summary-value{
  background:#eef6ff;
}

/* compact cell layout */
.plan-table-summary.is-compact{ table-layout:fixed; }
.plan-compact-center,
.plan-compact-stack,
.plan-compact-line{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  overflow:hidden;
}
.plan-compact-center{
  height:100%;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.plan-compact-stack{
  min-height:44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  text-align:center;
}
.plan-compact-line{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:11px;
  line-height:1.15;
}
.plan-compact-arrow{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
  font-size:9px;
  line-height:1;
  color:#64748b;
}

/* =========================================================
 * Personal Modal
 * ======================================================= */
.plan-modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:9999;
}
.plan-modal.is-open,
.plan-modal[aria-hidden="false"]{
  display:flex;
}
.plan-modal-box{
  width:min(1680px, 97vw);
  height:min(92vh, 980px);
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 16px 40px rgba(15,23,42,.18);
  display:flex;
  flex-direction:column;
}
.plan-modal-stickybar{
  background:#fff;
  border-bottom:1px solid #d6dee8;
  z-index:3;
}
.plan-modal-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  padding:18px 20px 12px;
}
.plan-modal-title{
  margin:0;
  font-size:22px;
  line-height:1.3;
  color:#0f172a;
}
.plan-modal-sub{
  margin-top:4px;
  font-size:12px;
  color:#64748b;
}
.plan-modal-head-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.plan-modal-toolbar{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
  padding:0 20px 14px;
  border-top:1px solid #eef2f7;
}
.plan-modal-statusline{
  margin-left:auto;
  align-self:center;
  min-height:18px;
  font-size:12px;
  color:#64748b;
  display:flex;
  align-items:center;
}

/* =========================================================
 * One-page layout
 * ======================================================= */
.plan-onepage-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0, 7.5fr) minmax(360px, 2.5fr);
}
.plan-calendar-pane{
  min-width:0;
  border-right:1px solid #d6dee8;
  background:#fff;
}
.plan-editor-pane{
  min-width:0;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
}
.plan-calendar-wrap-onepage{
  height:100%;
  overflow:auto;
  padding:12px;
  background:#f8fafc;
  box-sizing:border-box;
}

/* =========================================================
 * Personal Calendar
 * ======================================================= */
.plan-remake-table{
  width:100%;
  min-width:1080px;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:14px;
  overflow:hidden;
}
.plan-remake-table th,
.plan-remake-table td{
  border-right:1px solid #d6dee8;
  border-bottom:1px solid #d6dee8;
  box-sizing:border-box;
}
.plan-remake-table tr > *:last-child{
  border-right:none;
}
.plan-remake-table tbody tr:last-child > *{
  border-bottom:none;
}
.plan-remake-table thead th{
  position:sticky;
  top:0;
  z-index:5;
}
.plan-cal-head{
  background:#dbe8f6;
  color:#111827;
  text-align:center;
  font-weight:700;
  padding:10px 6px;
}
.plan-cal-day{
  height:108px;
  padding:6px;
  background:#fff;
  vertical-align:top;
}
.plan-cal-day.is-other-month{
  background:#f8fafc;
  color:#94a3b8;
}
.plan-cal-day.plan-row-holiday{ background:#fff7f7; }
.plan-cal-day.plan-row-sat{ background:#f8fbff; }
.plan-cal-day.is-today{
  box-shadow:inset 0 0 0 2px #3b82f6;
}
.plan-cal-date{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:6px;
}
.plan-cal-date-num{
  font-size:15px;
  font-weight:800;
  color:#0f172a;
}
.plan-cal-week{
  font-size:11px;
  font-weight:700;
  color:#64748b;
}
.plan-cal-lines{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.plan-cal-line{
  display:grid;
  grid-template-columns:30px 1fr;
  align-items:center;
  min-height:26px;
  border:1px solid #dbe4ee;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  overflow:hidden;
  transition:.15s ease;
}
.plan-cal-line:hover{
  border-color:#93c5fd;
  background:#f8fbff;
  box-shadow:0 0 0 3px rgba(59,130,246,.08);
}
.plan-cal-line.is-active{
  border-color:#60a5fa;
  background:#eff6ff;
  box-shadow:inset 0 0 0 1px #60a5fa;
}
.plan-cal-line-side{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid #dbe4ee;
  background:#f8fafc;
  font-size:10px;
  font-weight:800;
  color:#334155;
}
.plan-cal-line-main{
  min-width:0;
  padding:3px 6px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}
.plan-cal-main-left{
  min-width:0;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.plan-cal-main-right{
  min-width:0;
  font-size:11px;
  color:#64748b;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.plan-cal-empty{
  font-size:11px;
  color:#94a3b8;
}

/* =========================================================
 * Right Editor
 * ======================================================= */
.plan-editor-sticky{
  position:sticky;
  top:0;
  z-index:2;
  background:#f8fafc;
  border-bottom:1px solid #d6dee8;
  padding:10px 10px 8px;
}
.plan-editor-datebox{
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:10px;
  padding:8px 10px;
  margin-bottom:8px;
}
.plan-editor-date-label{
  font-size:10px;
  color:#6b7280;
  margin-bottom:2px;
}
.plan-editor-date{
  font-size:14px;
  font-weight:700;
  line-height:1.35;
  color:#111827;
}
.plan-editor-actions-top{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.plan-editor-body{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#f8fafc;
}
.plan-edit-block{
  display:grid;
  grid-template-columns:44px 1fr;
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:12px;
  overflow:hidden;
  min-height:238px;
}
.plan-edit-side{
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
  letter-spacing:.04em;
  writing-mode:vertical-rl;
  text-orientation:upright;
  border-right:1px solid #d6dee8;
  padding:8px 0;
}
.plan-edit-block-am{
  border-color:#d9e3d2;
}
.plan-edit-block-am .plan-edit-side{
  background:linear-gradient(180deg, #eef6ea 0%, #f8fcf6 100%);
  color:#4f6b47;
}
.plan-edit-block-pm{
  border-color:#d9dceb;
}
.plan-edit-block-pm .plan-edit-side{
  background:linear-gradient(180deg, #edf2fb 0%, #f7f9fe 100%);
  color:#4a5f8a;
}
.plan-edit-main{
  padding:5px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.plan-field{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:0;
}
.plan-editor-pane .plan-label{
  font-size:11px;
  font-weight:600;
  color:#374151;
}
.plan-editor-pane .plan-select,
.plan-editor-pane .plan-input{
  min-width:0;
  height:34px;
  min-height:34px;
  border-radius:8px;
  padding:6px 8px;
  font-size:12px;
}
.plan-select.is-disabled{
  background:#f8fafc;
  color:#94a3b8;
  cursor:not-allowed;
}
.plan-field-row{
  display:grid;
  grid-template-columns:72px 1fr;
  gap:8px;
  align-items:end;
}
.plan-field-status,
.plan-field-location{
  min-width:0;
}
.plan-field-status .plan-select{
  min-width:0;
  padding-left:6px;
  padding-right:6px;
  text-align:center;
}
.plan-field-location .plan-select{
  min-width:0;
}

/* =========================================================
 * Responsive
 * ======================================================= */
@media (max-width: 1400px){
  .plan-member-filter-pop{
    width:200px;
  }
  .plan-summary-cell,
  #planSummaryTable th.plan-summary-cell,
  #planSummaryTable td.plan-summary-cell{
    width:72px;
    min-width:72px;
    max-width:72px;
  }
}

@media (max-width: 1280px){
  #panel-plan{
    height:calc(100vh - 96px);
  }
}

@media (max-width: 1100px){
  .plan-modal-toolbar{
    align-items:stretch;
  }
  .plan-modal-statusline{
    width:100%;
    margin-left:0;
  }
  .plan-onepage-layout{
    grid-template-columns:1fr;
  }
  .plan-calendar-pane{
    border-right:none;
    border-bottom:1px solid #d6dee8;
    min-height:45vh;
  }
  .plan-editor-pane{
    min-height:35vh;
  }
  .plan-remake-table{
    min-width:980px;
  }
  .plan-edit-block{
    grid-template-columns:40px 1fr;
    min-height:auto;
  }
  .plan-edit-side{
    font-size:12px;
  }
  .plan-field-row{
    grid-template-columns:64px 1fr;
    gap:6px;
  }
}

@media (max-width: 900px){
  #panel-plan{
    padding:10px 10px 12px;
    height:calc(100vh - 88px);
  }
}

#planSummaryTable th.plan-summary-cell.is-me{
  background:#dbeafe;
  color:#1d4ed8;
}

#planSummaryTable td.plan-summary-cell.is-me{
  background:#eff6ff;
}

#planSummaryTable td.plan-summary-cell.is-me:empty{
  background:#eff6ff;
}

#planSummaryTable thead th{
  background:#c7d8ea !important;
  color:#0f172a;
  box-shadow:0 1px 0 #b7cada;
}

#planSummaryTable .plan-summary-date-merged{
  background:#c7d8ea !important;
}

#planSummaryTable th.plan-summary-cell.is-me{
  background:#1d4f91 !important;
  color:#fff;
}
/* AM/PM違い時の1行を縦並びに */
#planSummaryTable .plan-compact-line{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:1px;
  width:100%;
}

/* ＠以降はタグの下に小さく表示 */
#planSummaryTable .plan-note{
  display:block;
  margin-top:1px;
  font-size:8px;
  line-height:1.05;
  color:#64748b;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
</style>
