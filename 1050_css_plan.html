<style>
/* =========================================================
 * PLAN REMAKE v2
 * - 全体表示を画面いっぱい
 * - ヘッダー固定
 * - 左2列固定
 * - スクロールしやすく
 * ======================================================= */

/* ===== panel全体 ===== */
#panel-plan{
  display:none;
}

#panel-plan.active{
  display:block;
}

#panel-plan{
  padding:12px 16px 16px;
  flex:1;
  min-height:0;
  box-sizing:border-box;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
}

#panel-plan.active{
  display:flex;
}

/* toolbarは上に残す */
#panel-plan .panel-toolbar{
  flex:0 0 auto;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin:0;
}

#panel-plan .panel-toolbar-left,
#panel-plan .panel-toolbar-right{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
}

/* =========================================================
 * Common
 * ======================================================= */

.plan-card{
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:14px;
  overflow:hidden;
}

.plan-label{
  font-size:12px;
  font-weight:700;
  color:#475569;
}

.plan-input,
.plan-select{
  height:38px;
  min-width:140px;
  border:1px solid #cfd8e3;
  border-radius:10px;
  padding:0 10px;
  background:#fff;
  color:#111827;
  box-sizing:border-box;
}

.plan-input:focus,
.plan-select:focus{
  outline:none;
  border-color:#6aa9ff;
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}

.plan-input-month{
  min-width:150px;
}

.plan-btn{
  height:38px;
  padding:0 14px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  transition:.15s ease;
}

.plan-btn:hover{
  filter:brightness(.98);
}

.plan-btn-primary{
  background:#2563eb;
  color:#fff;
}

.plan-btn-light{
  background:#e2e8f0;
  color:#1e293b;
}

.plan-toolbar-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.plan-text-center{
  text-align:center;
}

.plan-muted{
  color:#94a3b8;
}

.plan-half-label{
  font-weight:700;
  color:#475569;
}

.plan-note{
  color:#334155;
  font-size:12px;
}

.plan-chip{
  display:inline-flex;
  align-items:center;
  min-height:20px;
  padding:0 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  line-height:1;
  margin:1px 4px 1px 0;
  background:#e2e8f0;
  color:#334155;
}

.plan-chip.is-honsya{ background:#dbeafe; color:#1d4ed8; }
.plan-chip.is-kashiwa{ background:#dcfce7; color:#15803d; }
.plan-chip.is-yakura{ background:#ede9fe; color:#6d28d9; }
.plan-chip.is-client{ background:#ffedd5; color:#c2410c; }
.plan-chip.is-vacation{ background:#fee2e2; color:#b91c1c; }
.plan-chip.is-vacation-weekend{ background:#e5e7eb; color:#6b7280; }
.plan-chip.is-default{ background:#e2e8f0; color:#334155; }

/* =========================================================
 * Summary card
 * ======================================================= */

#panel-plan .plan-card{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

.plan-table-wrap{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  height:100%;
  overflow:auto;
  background:#fff;
  position:relative;
  overscroll-behavior:contain;
}

/* スクロールバーを見やすく */
.plan-table-wrap::-webkit-scrollbar{
  height:12px;
  width:12px;
}
.plan-table-wrap::-webkit-scrollbar-thumb{
  background:#c6d4e3;
  border-radius:999px;
  border:2px solid #f8fafc;
}
.plan-table-wrap::-webkit-scrollbar-track{
  background:#f8fafc;
}

/* table本体 */
.plan-table{
  border-collapse:separate;
  border-spacing:0;
  width:max-content;
  min-width:100%;
  font-size:13px;
}

.plan-table th,
.plan-table td{
  box-sizing:border-box;
  border-right:1px solid #d6dee8;
  border-bottom:1px solid #d6dee8;
  padding:6px 8px;
  background:#fff;
  vertical-align:middle;
}

.plan-table tr > *:first-child{
  border-left:1px solid #d6dee8;
}

.plan-table thead tr:first-child > *{
  border-top:1px solid #d6dee8;
}

/* ===== 上部ヘッダー固定（メンバー名） ===== */
.plan-table-summary thead th{
  position:sticky;
  top:0;
  z-index:30;
  background:#dbe8f6;
  color:#111827;
  font-weight:700;
  text-align:center;
  white-space:nowrap;
  box-shadow:0 1px 0 #c7d5e6;
}

/* 左2列固定 */
.plan-summary-date-merged{
  min-width:110px;
  width:110px;
  position:sticky !important;
  left:0;
  z-index:40 !important;
  background:#dbe8f6 !important;
}

.plan-summary-date,
.plan-table-summary td.plan-summary-date{
  width:80px;
  min-width:80px;
  max-width:80px;
  font-weight:700;
  background:#f8fafc;
  position:sticky;
  left:0;
  z-index:12;
}

.plan-summary-value,
.plan-table-summary td.plan-summary-value{
  width:40px;
  min-width:40px;
  max-width:40px;
  text-align:center;
  background:#f8fafc;
  position:sticky;
  left:80px;
  z-index:12;
}

/* ヘッダーの左固定列をさらに前面へ */
.plan-table-summary thead th.plan-summary-date-merged{
  left:0;
  z-index:45 !important;
}

/* データセル */
.plan-table-summary td{
  height:64px;
  min-height:64px;
  max-height:64px;
  font-size:13px;
  white-space:normal;
  line-height:1.35;
  vertical-align:middle;
  overflow:hidden;
}

.plan-summary-cell{
  min-width:190px;
  width:190px;
  white-space:normal;
  vertical-align:top;
  padding:8px 10px;
}

/* 各セルを少しカードっぽく */
.plan-table-summary tbody td.plan-summary-cell{
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(180deg, #eef4fb, #e2ebf5) border-box;
}

.plan-table-summary tbody td.plan-summary-cell:empty{
  background:#fff;
}

/* hover */
.plan-table-summary tbody tr:hover td{
  background-color:#fafcff;
}

.plan-table-summary tbody tr:hover td.plan-summary-date,
.plan-table-summary tbody tr:hover td.plan-summary-value{
  background:#eef4f8;
}

/* 休日色 */
.plan-row-holiday td{
  background:#fff7f7;
}

.plan-row-sat td{
  background:#f8fbff;
}

.plan-row-holiday td.plan-summary-date,
.plan-row-holiday td.plan-summary-value{
  background:#fff1f1;
}

.plan-row-sat td.plan-summary-date,
.plan-row-sat td.plan-summary-value{
  background:#eef6ff;
}

/* =========================================================
 * Personal Modal
 * ======================================================= */

.plan-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,.45);
  z-index:2000;
  padding:18px;
  box-sizing:border-box;
}

.plan-modal.is-open{
  display:flex;
}

.plan-modal-box{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 20px 60px rgba(15,23,42,.25);
}

.plan-modal-box-remake{
  width:min(1600px, 97vw);
  height:min(92vh, 980px);
}

.plan-modal-stickybar{
  position:sticky;
  top:0;
  z-index:20;
  background:#fff;
  border-bottom:1px solid #e5edf5;
}

.plan-modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px 18px 12px;
}

.plan-modal-head-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.plan-modal-title{
  margin:0;
  font-size:20px;
  font-weight:700;
  color:#0f172a;
}

.plan-modal-sub{
  margin-top:4px;
  font-size:12px;
  color:#64748b;
}

.plan-modal-toolbar{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
  padding:0 18px 14px;
}

.plan-modal-statusline{
  margin-left:auto;
  min-height:18px;
  font-size:12px;
  color:#64748b;
  display:flex;
  align-items:center;
}

.plan-calendar-wrap-remake{
  flex:1;
  min-height:0;
  overflow:auto;
  background:#f8fafc;
  padding:14px;
  box-sizing:border-box;
}

/* =========================================================
 * Personal calendar
 * ======================================================= */

.plan-remake-table{
  width:100%;
  min-width:1120px;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  background:#fff;
  border:1px solid #d6dee8;
  border-radius:14px;
  overflow:hidden;
}

.plan-remake-table th,
.plan-remake-table td{
  border-right:1px solid #d6dee8;
  border-bottom:1px solid #d6dee8;
  box-sizing:border-box;
}

.plan-remake-table tr > *:last-child{
  border-right:none;
}

.plan-remake-table tbody tr:last-child > *{
  border-bottom:none;
}

.plan-cal-head{
  background:#dbe8f6;
  color:#111827;
  text-align:center;
  font-weight:700;
  padding:10px 6px;
  position:sticky;
  top:0;
  z-index:5;
}

.plan-cal-day{
  height:118px;
  padding:8px;
  background:#fff;
  vertical-align:top;
}

.plan-cal-day.is-other-month{
  background:#f8fafc;
  color:#94a3b8;
}

.plan-cal-day.plan-row-holiday{
  background:#fff7f7;
}

.plan-cal-day.plan-row-sat{
  background:#f8fbff;
}

.plan-cal-day.is-today{
  box-shadow:inset 0 0 0 2px #3b82f6;
}

.plan-cal-date{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.plan-cal-date-num{
  font-size:15px;
  font-weight:800;
  color:#0f172a;
}

.plan-cal-week{
  font-size:11px;
  font-weight:700;
  color:#64748b;
}

.plan-cal-lines{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.plan-cal-line{
  display:grid;
  grid-template-columns:34px 1fr;
  align-items:center;
  min-height:30px;
  border:1px solid #dbe4ee;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
  overflow:hidden;
  transition:.15s ease;
}

.plan-cal-line:hover{
  border-color:#93c5fd;
  background:#f8fbff;
  box-shadow:0 0 0 3px rgba(59,130,246,.08);
}

.plan-cal-line-side{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid #dbe4ee;
  background:#f8fafc;
  font-size:11px;
  font-weight:800;
  color:#334155;
}

.plan-cal-line-main{
  min-width:0;
  padding:4px 8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}

.plan-cal-main-left{
  min-width:0;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.plan-cal-main-right{
  min-width:0;
  font-size:11px;
  color:#64748b;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.plan-cal-empty{
  font-size:11px;
  color:#94a3b8;
}

.plan-cal-customer-inline{
  font-size:11px;
  color:#64748b;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}

/* =========================================================
 * Day Editor Modal
 * ======================================================= */

.plan-day-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,.45);
  z-index:2100;
  padding:20px;
  box-sizing:border-box;
}

.plan-day-modal.is-open{
  display:flex;
}

.plan-day-modal-box{
  width:min(920px, 96vw);
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(15,23,42,.25);
}

.plan-day-modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px 18px 12px;
  border-bottom:1px solid #e5edf5;
}

.plan-day-modal-title{
  margin:0;
  font-size:18px;
  font-weight:700;
  color:#0f172a;
}

.plan-modal-close{
  width:36px;
  height:36px;
  border:none;
  border-radius:8px;
  background:#f1f5f9;
  color:#334155;
  font-size:22px;
  line-height:1;
  cursor:pointer;
}

.plan-day-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:16px;
}

.plan-day-card{
  border:1px solid #dbe4ee;
  border-radius:12px;
  padding:14px;
  background:#fbfdff;
}

.plan-day-card-title{
  font-size:14px;
  font-weight:700;
  color:#0f172a;
  margin-bottom:12px;
}

.plan-field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:10px;
}

.plan-day-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  padding:0 16px 16px;
}

@media (max-width: 1280px){
  #panel-plan{
    height:calc(100vh - 96px);
  }

  .plan-summary-cell{
    min-width:170px;
    width:170px;
  }
}

@media (max-width: 1100px){
  .plan-modal-toolbar{
    align-items:stretch;
  }

  .plan-modal-statusline{
    width:100%;
    margin-left:0;
  }

  .plan-remake-table{
    min-width:980px;
  }
}

@media (max-width: 900px){
  .plan-day-grid{
    grid-template-columns:1fr;
  }

  #panel-plan{
    padding:10px 10px 12px;
    height:calc(100vh - 88px);
  }

  .plan-summary-cell{
    min-width:150px;
    width:150px;
  }
}
</style>
