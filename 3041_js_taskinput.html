<script>

function openTaskModal(){
  const modal = document.getElementById('taskModal');
  if (!modal) return;
  modal.setAttribute('aria-hidden', 'false');
  modal.classList.add('open');
}

function closeTaskModal(){
  const modal = document.getElementById('taskModal');
  if (!modal) return;
  modal.setAttribute('aria-hidden', 'true');
  modal.classList.remove('open');
}

function saveTask(){
  const data = {
    task: document.getElementById('taskName')?.value?.trim() || '',
    link: document.getElementById('taskLink')?.value?.trim() || '',
    date: document.getElementById('taskDate')?.value || ''
  };

  if (!data.task) {
    alert('タスクを入力してください');
    return;
  }

  google.script.run
    .withSuccessHandler(function(res){
      if (!res || !res.ok) {
        alert(res?.error || '登録に失敗しました');
        return;
      }

      const nameEl = document.getElementById('taskName');
      const linkEl = document.getElementById('taskLink');
      const dateEl = document.getElementById('taskDate');

      if (nameEl) nameEl.value = '';
      if (linkEl) linkEl.value = '';
      if (dateEl) dateEl.value = '';

      closeTaskModal();
      loadTask();
    })
    .withFailureHandler(function(err){
      console.error('api_addTask error', err);
      alert('登録に失敗しました');
    })
    .api_addTask(data);
}
</script>
