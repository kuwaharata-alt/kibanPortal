<section id="panel-wbs" class="panel">
  <div class="case-wbs-toolbar-wrap">
    <div class="case-wbs-toolbar">
      <div class="case-wbs-toolbar-left">
        <div class="case-wbs-field">
          <label for="caseWbsType">区分</label>
          <select id="caseWbsType">
            <option value="SV">SV</option>
            <option value="CL">CL</option>
          </select>
        </div>

        <div class="case-wbs-field">
          <label for="caseWbsStartDate">開始日</label>
          <input type="date" id="caseWbsStartDate">
        </div>

        <div class="case-wbs-field">
          <label for="caseWbsRange">表示日数</label>
          <select id="caseWbsRange">
            <option value="31">1か月</option>
            <option value="62" selected>2か月</option>
            <option value="93">3か月</option>
            <option value="186">6か月</option>
          </select>
        </div>

        <div class="case-wbs-field case-wbs-field-member">
          <label for="caseWbsMemberFilter">担当者</label>
          <select id="caseWbsMemberFilter"></select>
        </div>
      </div>

      <div class="case-wbs-toolbar-right">
        <div id="caseWbsErr" class="err"></div>
        <div id="caseWbsMeta" class="small"></div>
      </div>
    </div>
  </div>

  <div class="card case-wbs-card">

    <div class="case-wbs-shell">
      <div id="caseWbsRoot" class="case-wbs-root"></div>
    </div>
  </div>
</section>
