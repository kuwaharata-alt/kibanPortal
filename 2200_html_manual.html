        <div id="manualMeta" class="manual-meta">読込中...</div>
      </div>
    </div>

    <div id="manualErr" class="manual-err"></div>

      <div id="manualModalTitle" class="manual-modal-title">マニュアル</div>
      <div class="manual-modal-actions">
        <a id="manualModalLink" class="manual-modal-link" href="#" target="_blank" rel="noopener noreferrer">別タブで開く</a>
        <button type="button" class="manual-modal-close" onclick="closeManualModal()">×</button>

    <div class="manual-modal-body">
      <iframe id="manualFrame" src="" allowfullscreen></iframe>
    </div>
  </div>
