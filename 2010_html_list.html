<section id="panel-list" class="panel">

  <div class="panel-head">
    <div class="panel-head-left"></div>
    <div class="panel-head-right">
      <div class="panel-meta" id="meta"></div>
      <div class="panel-err" id="err"></div>
    </div>
  </div>

  <div class="panel-toolbar">
    <div class="panel-toolbar-left">
      <label class="small">担当者</label>

      <div class="dd" id="memberDD">
        <button type="button" class="dd-btn" id="memberBtn" onclick="toggleMemberDD_(event)">
          全員
        </button>
        <div class="dd-menu" id="memberMenu"></div>
      </div>

      <div class="st" id="stAll">
        <button type="button" class="st-btn" id="statusBtn" onclick="stAll_(event)">
          すべて
        </button>
        <div class="st-menu" id="statusMenu"></div>
      </div>

      <div class="small" id="memberSelected"></div>

      <select id="inspectMonth">
        <option value="">すべて</option>
        <option value="__THIS_MONTH__">今月</option>
      </select>
    </div>

    <div class="panel-toolbar-right">
      <input id="q"
             placeholder="検索（見積番号/顧客名/案件概要など）"
             style="min-width:260px;"
             onkeydown="if(event.key==='Enter') { state.page=1; loadCases_(); }" />
      <button class="primary" onclick="loadCases_()">検索</button>
    </div>
  </div>

  <div class="card table-card">
    <div class="table-shell" style="max-height:80vh;">
      <table id="tbl">
        <colgroup>
          <col style="width:5%">
          <col style="width:10%">
          <col style="width:15%">
          <col style="width:20%">
          <col style="width:10%">
          <col style="width:13%">
          <col style="width:22%">
        </colgroup>
        <thead><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <div class="small" id="count"></div>
    </div>
  </div>
</section>
