<script>
/* =========================================================
 * PLAN App JS
 * - 全体表示をデフォルト
 * - 個人登録はカレンダーモーダル
 * - 整理版
 * ======================================================= */

window.PlanAppState = window.PlanAppState || {
  baseYm: '',
  months: 1,
  memberName: '',
  master: {
    members: [],
    statusList: [],
    locationList: [],
    vacationList: [],
  },
  personalRows: [],
  summaryValues: [],
  holidaySet: new Set(),
  dirty: false,
  dayEditDate: '',
  dayEditHalf: 'am',
};

window.__planInitialized = false;
window.__planEventsBound = false;

/* =========================================================
 * Helpers
 * ======================================================= */

const $pid = id => document.getElementById(id);
const nz = v => String(v ?? '').trim();

function escHtml(str){
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function ymFromInputValue(v){
  if (!v) return '';
  const s = String(v).trim();

  if (s.includes('-')) {
    const [y, m] = s.split('-');
    return `${y}/${String(m).padStart(2, '0')}`;
  }

  if (s.includes('/')) {
    const [y, m] = s.split('/');
    return `${y}/${String(m).padStart(2, '0')}`;
  }

  return '';
}

function inputValueFromYm(ym){
  if (!ym) return '';
  const [y, m] = String(ym).split('/');
  return `${y}-${m}`;
}

function weekdayJa(date){
  const arr = ['日', '月', '火', '水', '木', '金', '土'];
  return arr[new Date(date).getDay()] || '';
}

function formatDateKeyForClient_(d){
  const dt = new Date(d);
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}

function getTodayYm(){
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getTodayKey_(){
  return formatDateKeyForClient_(new Date());
}

function formatMd_(dateKey){
  const d = new Date(dateKey);
  if (isNaN(d)) return dateKey;
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function createOptionHtml(list, val, ph = ''){
  let html = `<option value="">${escHtml(ph)}</option>`;
  (list || []).forEach(v => {
    const s = String(v) === String(val) ? ' selected' : '';
    html += `<option value="${escHtml(v)}"${s}>${escHtml(v)}</option>`;
  });
  return html;
}

function confirmPlanDiscardIfDirty(){
  if (!window.PlanAppState.dirty) return true;
  return window.confirm('未保存の変更があります。続行しますか？');
}

function makeEmptyPlanRow_(dateKey){
  return {
    date: dateKey,
    week: weekdayJa(dateKey),
    amStatus: '',
    amLocation: '',
    amVacation: '',
    amCustomer: '',
    pmStatus: '',
    pmLocation: '',
    pmVacation: '',
    pmCustomer: '',
  };
}

function getPersonalRowByDate_(dateKey){
  const rows = window.PlanAppState.personalRows || [];
  let row = rows.find(r => String(r.date) === String(dateKey));

  if (!row) {
    row = makeEmptyPlanRow_(dateKey);
    rows.push(row);
    rows.sort((a, b) => new Date(a.date) - new Date(b.date));
    window.PlanAppState.personalRows = rows;
  }

  return row;
}

/* =========================================================
 * Meta / Status
 * ======================================================= */

function setPlanMeta_(msg){
  if (typeof window.setMeta === 'function') {
    window.setMeta(msg || '');
    return;
  }
  const el = document.getElementById('meta');
  if (el) el.textContent = msg || '';
}

function setPlanErr_(msg){
  if (typeof window.setErr === 'function') {
    window.setErr(msg || '');
    return;
  }
  const el = document.getElementById('meta');
  if (el) el.textContent = msg || '';
}

function setPlanModalStatusLine_(msg){
  const el = $pid('planModalStatusLine');
  if (el) el.textContent = msg || '';
}

function buildSummaryMetaText_(ym, months, values){
  const count = Math.max(0, (values?.length || 0) - 1);
  return `予定管理：${ym} / ${months}か月 / ${count}日分`;
}

function buildPersonalMetaText_(member, ym, months, rows){
  const count = rows?.length || 0;
  return `個人予定：${member} / ${ym} / ${months}か月 / ${count}件`;
}

/* =========================================================
 * Holiday / row helpers
 * ======================================================= */

function isHoliday(dateKey){
  return window.PlanAppState.holidaySet.has(String(dateKey || '').trim());
}

function rowClassByDate(dateKey){
  const d = new Date(dateKey);
  if (isHoliday(dateKey) || d.getDay() === 0) return 'plan-row-holiday';
  if (d.getDay() === 6) return 'plan-row-sat';
  return '';
}

/* =========================================================
 * GAS wrapper
 * ======================================================= */

function gasCall_(fn, ...args){
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(e => reject(new Error(e?.message || e)))
      [fn](...args);
  });
}

/* =========================================================
 * Entry
 * ======================================================= */

async function loadPlan_(){
  if (window.__planInitialized) return;

  try {
    window.__planInitialized = true;
    await initPlanApp_();
  } catch (err) {
    window.__planInitialized = false;
    console.error(err);
    setPlanErr_(err?.message || '予定管理の初期化に失敗しました');
  }
}

/* =========================================================
 * Init
 * ======================================================= */

async function initPlanApp_(){
  bindPlanEvents_();

  const ym = getTodayYm();
  window.PlanAppState.baseYm = ym;
  window.PlanAppState.months = Number($pid('planRange2')?.value || '1');

  if ($pid('planTargetMonth'))  $pid('planTargetMonth').value = inputValueFromYm(ym);
  if ($pid('planTargetMonth2')) $pid('planTargetMonth2').value = inputValueFromYm(ym);

  setPlanMeta_('予定管理を初期化中...');
  setPlanErr_('');

  const res = await gasCall_('api_getPlanInitContext');
  if (!res?.ok) {
    throw new Error(res?.error || '初期化に失敗しました');
  }

  window.PlanAppState.master = {
    members: res.members || [],
    statusList: res.statusList || [],
    locationList: res.locationList || [],
    vacationList: res.vacationList || [],
  };

  const holidayRes = await gasCall_('api_getPlanHolidayList');
  if (holidayRes?.ok) {
    window.PlanAppState.holidaySet = new Set(holidayRes.dates || []);
  }

  populatePlanMemberSelect_();

  const member = res.defaultMember || '';
  window.PlanAppState.memberName = member;

  if (member && $pid('planMember')) {
    $pid('planMember').value = member;
  }

  await loadPlanSummary_();
}

/* =========================================================
 * Events
 * ======================================================= */

function bindPlanEvents_(){
  if (window.__planEventsBound) return;
  window.__planEventsBound = true;

  $pid('planTargetMonth2')?.addEventListener('change', () => {
    loadPlanSummary_().catch(err => {
      console.error(err);
      setPlanErr_(err?.message || '全体表示の再読込に失敗しました');
    });
  });

  $pid('planRange2')?.addEventListener('change', () => {
    loadPlanSummary_().catch(err => {
      console.error(err);
      setPlanErr_(err?.message || '全体表示の再読込に失敗しました');
    });
  });

  $pid('btnOpenPlanPersonal')?.addEventListener('click', async () => {
    if (!confirmPlanDiscardIfDirty()) return;
    try {
      await openPlanPersonalModal_();
    } catch (err) {
      console.error(err);
      setPlanErr_(err?.message || '個人予定モーダルの表示に失敗しました');
    }
  });

  $pid('btnClosePlanPersonal')?.addEventListener('click', closePlanPersonalModal_);

  $pid('planPersonalModal')?.addEventListener('click', e => {
    if (e.target.id === 'planPersonalModal') {
      closePlanPersonalModal_();
    }
  });

  $pid('planTargetMonth')?.addEventListener('change', async () => {
    if (!confirmPlanDiscardIfDirty()) {
      $pid('planTargetMonth').value = inputValueFromYm(window.PlanAppState.baseYm || getTodayYm());
      return;
    }
    try {
      await loadPlanPersonal_();
    } catch (err) {
      console.error(err);
      setPlanErr_(err?.message || '個人予定の再読込に失敗しました');
    }
  });

  $pid('planRange')?.addEventListener('change', async () => {
    if (!confirmPlanDiscardIfDirty()) {
      $pid('planRange').value = String(window.PlanAppState.months || 1);
      return;
    }
    try {
      await loadPlanPersonal_();
    } catch (err) {
      console.error(err);
      setPlanErr_(err?.message || '個人予定の再読込に失敗しました');
    }
  });

  $pid('planMember')?.addEventListener('change', async () => {
    if (!confirmPlanDiscardIfDirty()) {
      $pid('planMember').value = window.PlanAppState.memberName || '';
      return;
    }
    try {
      await loadPlanPersonal_();
    } catch (err) {
      console.error(err);
      setPlanErr_(err?.message || '個人予定の再読込に失敗しました');
    }
  });

  $pid('btnPlanSavePersonal')?.addEventListener('click', () => {
    savePlanPersonal_().catch(err => {
      console.error(err);
      setPlanErr_(err?.message || '保存に失敗しました');
      setPlanModalStatusLine_('保存に失敗しました');
    });
  });

  $pid('btnClosePlanDayModal')?.addEventListener('click', closePlanDayModal_);

  $pid('planDayModal')?.addEventListener('click', e => {
    if (e.target.id === 'planDayModal') closePlanDayModal_();
  });

  $pid('btnPlanDaySave')?.addEventListener('click', savePlanDayEditor_);
  $pid('btnPlanDayClear')?.addEventListener('click', clearPlanDayEditor_);
  $pid('btnPlanDayCopyAmToPm')?.addEventListener('click', copyAmToPmPlanDayEditor_);

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;

    if ($pid('planDayModal')?.classList.contains('is-open')) {
      closePlanDayModal_();
      return;
    }

    if ($pid('planPersonalModal')?.classList.contains('is-open')) {
      closePlanPersonalModal_();
    }
  });
}

/* =========================================================
 * Master
 * ======================================================= */

async function loadPlanMaster_(){
  const res = await gasCall_('api_getPlanMaster');

  if (!res?.ok) {
    throw new Error(res?.error || 'マスタ取得に失敗しました');
  }

  window.PlanAppState.master = {
    members: res.members || [],
    statusList: res.statusList || [],
    locationList: res.locationList || [],
    vacationList: res.vacationList || [],
  };

  populatePlanMemberSelect_();
}

function populatePlanMemberSelect_(){
  const el = $pid('planMember');
  if (!el) return;

  const members = window.PlanAppState.master.members || [];

  el.innerHTML =
    '<option value="">選択してください</option>' +
    members.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
}

/* =========================================================
 * Personal Modal
 * ======================================================= */

async function openPlanPersonalModal_(){
  const modal = $pid('planPersonalModal');
  if (!modal) return;

  if ($pid('planTargetMonth')) {
    $pid('planTargetMonth').value = inputValueFromYm(window.PlanAppState.baseYm || getTodayYm());
  }

  if ($pid('planRange')) {
    $pid('planRange').value = String(window.PlanAppState.months || 1);
  }

  if ($pid('planMember') && window.PlanAppState.memberName) {
    $pid('planMember').value = window.PlanAppState.memberName;
  }

  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');

  setPlanModalStatusLine_('個人予定を読み込み中...');
  await loadPlanPersonal_();
}

function closePlanPersonalModal_(){
  const modal = $pid('planPersonalModal');
  if (!modal) return;

  if (window.PlanAppState.dirty) {
    const ok = window.confirm('未保存の変更があります。閉じますか？');
    if (!ok) return;
  }

  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
}

/* =========================================================
 * Personal
 * ======================================================= */

async function loadPlanPersonal_(){
  const st = window.PlanAppState;
  const member = $pid('planMember')?.value || st.memberName || '';
  const ym = ymFromInputValue($pid('planTargetMonth')?.value || '') || getTodayYm();
  const months = Number($pid('planRange')?.value || '1');

  st.memberName = member;
  st.baseYm = ym;
  st.months = months;

  if (!member) {
    renderPlanPersonalCalendar_([]);
    setPlanMeta_('予定管理：メンバーを選択してください');
    setPlanModalStatusLine_('メンバーを選択してください');
    return;
  }

  setPlanMeta_(`個人予定を読込中：${member} / ${ym} / ${months}か月`);
  setPlanModalStatusLine_(`${member} を読み込み中...`);
  setPlanErr_('');

  const res = await gasCall_('api_getMemberMonthPlan', member, ym, months);

  if (!res?.ok) {
    throw new Error(res?.error || '個人予定の取得に失敗しました');
  }

  st.personalRows = res.data || [];
  st.dirty = false;

  renderPlanPersonalCalendar_(st.personalRows);

  const metaText = buildPersonalMetaText_(member, ym, months, st.personalRows);
  setPlanMeta_(metaText);
  setPlanModalStatusLine_(metaText);
}

function buildPlanCalendarMatrix_(baseYm, rows, months = 1){
  const map = {};

  (rows || []).forEach(r => {
    map[String(r.date)] = r;
  });

  const [y, m] = String(baseYm).split('/').map(Number);

  const first = new Date(y, m - 1, 1);
  const last  = new Date(y, m - 1 + Number(months), 0);

  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());

  const end = new Date(last);
  end.setDate(last.getDate() + (6 - last.getDay()));

  const weeks = [];
  let cur = new Date(start);

  while (cur <= end) {
    const week = [];

    for (let i = 0; i < 7; i++) {
      const d = new Date(cur);
      const key = formatDateKeyForClient_(d);

      week.push({
        date: key,
        inMonth: d >= first && d <= last,
        row: map[key] || makeEmptyPlanRow_(key),
      });

      cur.setDate(cur.getDate() + 1);
    }

    weeks.push(week);
  }

  return weeks;
}

function renderPlanPersonalCalendar_(rows){
  const head = $pid('planCalendarHead');
  const body = $pid('planCalendarBody');

  if (!head || !body) return;

  const ym = window.PlanAppState.baseYm || getTodayYm();
  const weeks = buildPlanCalendarMatrix_(
    ym,
    rows,
    Number(window.PlanAppState.months || 1)
  );

  const weekNames = ['日', '月', '火', '水', '木', '金', '土'];
  const todayKey = getTodayKey_();

  head.innerHTML = `
    <tr>
      ${weekNames.map(w => `<th class="plan-cal-head">${w}</th>`).join('')}
    </tr>
  `;

  body.innerHTML = weeks.map(week => `
    <tr>
      ${week.map(day => {
        const r = day.row || {};
        const rowCls = rowClassByDate(day.date);

        const cls = [
          'plan-cal-day',
          !day.inMonth ? 'is-other-month' : '',
          rowCls,
          day.date === todayKey ? 'is-today' : ''
        ].filter(Boolean).join(' ');

        return `
          <td class="${cls}" data-date="${escHtml(day.date)}">
            <div class="plan-cal-date">
              <span class="plan-cal-date-num">${escHtml(formatMd_(day.date))}</span>
              <span class="plan-cal-week">${escHtml(weekdayJa(day.date))}</span>
            </div>

            <div class="plan-cal-lines">
              ${renderPlanCompactHalfLine_(day.date, 'am', r.amStatus, r.amLocation, r.amVacation, r.amCustomer)}
              ${renderPlanCompactHalfLine_(day.date, 'pm', r.pmStatus, r.pmLocation, r.pmVacation, r.pmCustomer)}
            </div>
          </td>
        `;
      }).join('')}
    </tr>
  `).join('');

  bindPlanCalendarClicks_();
}

function bindPlanCalendarClicks_(){
  document.querySelectorAll('#planCalendarBody .plan-cal-line').forEach(el => {
    el.onclick = () => {
      const date = el.dataset.date;
      const half = el.dataset.half || 'am';
      openPlanDayEditor_(date, half);
    };
  });
}

/* =========================================================
 * Day Editor
 * ======================================================= */

function openPlanDayEditor_(dateKey, half){
  const modal = $pid('planDayModal');
  if (!modal) return;

  const row = getPersonalRowByDate_(dateKey);
  const { statusList, locationList, vacationList } = window.PlanAppState.master;

  window.PlanAppState.dayEditDate = dateKey;
  window.PlanAppState.dayEditHalf = half || 'am';

  if ($pid('planDayModalTitle')) {
    $pid('planDayModalTitle').textContent = `${dateKey}（${weekdayJa(dateKey)}） 予定編集`;
  }

  $pid('planDayAmStatus').innerHTML   = createOptionHtml(statusList, row.amStatus, '選択してください');
  $pid('planDayAmLocation').innerHTML = createOptionHtml(locationList, row.amLocation, '選択してください');
  $pid('planDayAmVacation').innerHTML = createOptionHtml(vacationList, row.amVacation, '選択してください');
  $pid('planDayAmCustomer').value     = row.amCustomer || '';

  $pid('planDayPmStatus').innerHTML   = createOptionHtml(statusList, row.pmStatus, '選択してください');
  $pid('planDayPmLocation').innerHTML = createOptionHtml(locationList, row.pmLocation, '選択してください');
  $pid('planDayPmVacation').innerHTML = createOptionHtml(vacationList, row.pmVacation, '選択してください');
  $pid('planDayPmCustomer').value     = row.pmCustomer || '';

  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');

  if (half === 'pm') {
    $pid('planDayPmStatus')?.focus();
  } else {
    $pid('planDayAmStatus')?.focus();
  }
}

function closePlanDayModal_(){
  const modal = $pid('planDayModal');
  if (!modal) return;

  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
}

function savePlanDayEditor_(){
  const dateKey = window.PlanAppState.dayEditDate;
  if (!dateKey) return;

  const row = getPersonalRowByDate_(dateKey);

  row.week       = weekdayJa(dateKey);
  row.amStatus   = $pid('planDayAmStatus')?.value || '';
  row.amLocation = $pid('planDayAmLocation')?.value || '';
  row.amVacation = $pid('planDayAmVacation')?.value || '';
  row.amCustomer = $pid('planDayAmCustomer')?.value || '';

  row.pmStatus   = $pid('planDayPmStatus')?.value || '';
  row.pmLocation = $pid('planDayPmLocation')?.value || '';
  row.pmVacation = $pid('planDayPmVacation')?.value || '';
  row.pmCustomer = $pid('planDayPmCustomer')?.value || '';

  window.PlanAppState.dirty = true;

  renderPlanPersonalCalendar_(window.PlanAppState.personalRows);

  setPlanMeta_('個人予定：未保存の変更があります');
  setPlanModalStatusLine_('未保存の変更があります');

  closePlanDayModal_();
}

function clearPlanDayEditor_(){
  $pid('planDayAmStatus').value = '';
  $pid('planDayAmLocation').value = '';
  $pid('planDayAmVacation').value = '';
  $pid('planDayAmCustomer').value = '';

  $pid('planDayPmStatus').value = '';
  $pid('planDayPmLocation').value = '';
  $pid('planDayPmVacation').value = '';
  $pid('planDayPmCustomer').value = '';
}

function copyAmToPmPlanDayEditor_(){
  $pid('planDayPmStatus').value   = $pid('planDayAmStatus').value || '';
  $pid('planDayPmLocation').value = $pid('planDayAmLocation').value || '';
  $pid('planDayPmVacation').value = $pid('planDayAmVacation').value || '';
  $pid('planDayPmCustomer').value = $pid('planDayAmCustomer').value || '';
}

/* =========================================================
 * Save
 * ======================================================= */

async function savePlanPersonal_(){
  const st = window.PlanAppState;

  if (!st.memberName) {
    setPlanErr_('メンバーが選択されていません');
    setPlanModalStatusLine_('メンバー未選択');
    return;
  }

  setPlanMeta_(`保存中：${st.memberName}`);
  setPlanModalStatusLine_('シート保存中...');
  setPlanErr_('');

  // ① まずシート保存だけ
  const saveRes = await gasCall_('api_saveMemberMonthPlanFast', {
    memberName: st.memberName,
    rows: st.personalRows
  });

  if (!saveRes?.ok) {
    throw new Error(saveRes?.error || '保存に失敗しました');
  }

  st.dirty = false;

  // ② 先に閉じる
  closePlanPersonalModal_();
  setPlanMeta_(`保存しました：${st.memberName}（カレンダー同期中...）`);

  // ③ 裏で同期
  google.script.run
    .withSuccessHandler(async (syncRes) => {
      if (!syncRes?.ok) {
        console.error(syncRes);
        setPlanErr_(syncRes?.error || 'カレンダー同期に失敗しました');
        return;
      }

      setPlanMeta_(`保存・カレンダー同期完了：${st.memberName}`);
      await loadPlanSummary_();
    })
    .withFailureHandler(err => {
      console.error(err);
      setPlanErr_('カレンダー同期に失敗しました');
    })
    .api_syncMemberMonthPlanCalendar({
      memberName: st.memberName
    });
}

/* =========================================================
 * Summary
 * ======================================================= */

async function loadPlanSummary_(){
  const st = window.PlanAppState;

  const ym = ymFromInputValue($pid('planTargetMonth2')?.value || '') || getTodayYm();
  const months = Number($pid('planRange2')?.value || '1');

  st.baseYm = ym;
  st.months = months;

  setPlanMeta_(`全体予定を読込中：${ym} / ${months}か月`);
  setPlanErr_('');

  const res = await gasCall_('api_getSummaryView', ym, months);

  if (!res?.ok) {
    throw new Error(res?.error || '全体表示の取得に失敗しました');
  }

  st.summaryValues = res.values || [];
  renderPlanSummaryTable_(st.summaryValues);

  const metaText = buildSummaryMetaText_(ym, months, st.summaryValues);
  setPlanMeta_(metaText);
}

function renderPlanSummaryTable_(values){
  const head = $pid('planSummaryHead');
  const body = $pid('planSummaryBody');

  if (!head || !body) return;

  if (!values.length) {
    head.innerHTML = '';
    body.innerHTML = `
      <tr>
        <td colspan="99" class="plan-text-center plan-muted" style="padding:16px;">
          データがありません
        </td>
      </tr>
    `;
    return;
  }

  const header = values[0] || [];
  const rows = values.slice(1);
  const memberHeaders = header.slice(2);

  head.innerHTML =
    '<tr>' +
      `<th class="plan-summary-date-merged" colspan="2">日付</th>` +
      memberHeaders.map(h => `<th class="plan-summary-cell">${escHtml(h)}</th>`).join('') +
    '</tr>';

  body.innerHTML = rows.map(r => {
    const cls = rowClassByDate(r[0]);

    return `<tr class="${cls}">` +
      r.map((c, idx) => {
        let tdCls = '';

        if (idx === 0) tdCls = 'plan-summary-date';
        else if (idx === 1) tdCls = 'plan-summary-value plan-text-center';
        else tdCls = 'plan-summary-cell';

        const html = idx >= 2
          ? renderSummaryCellHtml_(c, r[0])
          : escHtml(c);

        return `<td class="${tdCls}">${html}</td>`;
      }).join('') +
    `</tr>`;
  }).join('');
}

/* =========================================================
 * Personal calendar render helpers
 * ======================================================= */

function renderPlanCompactHalfLine_(dateKey, half, status, location, vacation, customer){
  const tagHtml = renderPlanHalfMainTag_(status, location, vacation);
  const customerHtml = nz(customer)
    ? `<span class="plan-cal-customer-inline">＠${escHtml(customer)}</span>`
    : '';

  return `
    <div class="plan-cal-line" data-date="${escHtml(dateKey)}" data-half="${escHtml(half)}">
      <div class="plan-cal-line-side">${half.toUpperCase()}</div>
      <div class="plan-cal-line-main">
        <div class="plan-cal-main-left">
          ${tagHtml}
        </div>
        <div class="plan-cal-main-right">
          ${customerHtml}
        </div>
      </div>
    </div>
  `;
}

function renderPlanHalfMainTag_(status, location, vacation){
  const st  = nz(status);
  const loc = nz(location);
  const vac = nz(vacation);

  if (st === '休暇') {
    return `<span class="plan-chip is-vacation">${escHtml(vac || '休暇')}</span>`;
  }

  if (loc) {
    return `<span class="plan-chip ${getPlanTagClass_(loc)}">${escHtml(loc)}</span>`;
  }

  if (st) {
    return `<span class="plan-chip is-default">${escHtml(st)}</span>`;
  }

  return `<span class="plan-cal-empty">未入力</span>`;
}

/* =========================================================
 * Summary render helpers
 * ======================================================= */

function renderSummaryCellHtml_(cell, dateKey){
  const text = nz(cell);
  if (!text) return '';

  const d = new Date(dateKey);
  const isWeekend =
    isHoliday(dateKey) ||
    d.getDay() === 0 ||
    d.getDay() === 6;

  let html = escHtml(text)
    .replace(/AM：/g, '<span class="plan-half-label">AM：</span>')
    .replace(/PM：/g, '<span class="plan-half-label">PM：</span>');

  html = html.replace(/\[\[TAG:([^\]]+)\]\]/g, (_, tag) => {
    const cls = getPlanTagClass_(tag);

    if (cls === 'is-vacation' && isWeekend) {
      return `<span class="plan-chip is-vacation-weekend">${escHtml(tag)}</span>`;
    }

    return `<span class="plan-chip ${cls}">${escHtml(tag)}</span>`;
  });

  html = html.replace(/＠([^\s<br>]+)/g, '<span class="plan-note">＠$1</span>');

  return html.replace(/\n/g, '<br>');
}

function getPlanTagClass_(tag){
  const t = nz(tag);

  if (/本社/.test(t)) return 'is-honsya';
  if (/柏倉庫/.test(t)) return 'is-kashiwa';
  if (/矢倉倉庫/.test(t)) return 'is-yakura';
  if (/現地/.test(t)) return 'is-client';
  if (/休暇/.test(t)) return 'is-vacation';

  return 'is-default';
}

/* =========================================================
 * unload guard
 * ======================================================= */

window.addEventListener('beforeunload', e => {
  if (!window.PlanAppState.dirty) return;
  e.preventDefault();
  e.returnValue = '';
});
</script>
